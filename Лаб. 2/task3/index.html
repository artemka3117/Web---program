<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 3 - Генератор паролів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 Генератор паролів</h1>

        <div class="password-display">
            <input type="text" id="passwordOutput" class="password-output" readonly>
            <button id="copyBtn" class="copy-btn">Копіювати</button>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label for="passwordLength">Довжина пароля: <span id="lengthValue">12</span></label>
                <input 
                    type="range" 
                    id="passwordLength" 
                    min="4" 
                    max="32" 
                    value="12"
                    class="slider"
                >
            </div>

            <div class="checkboxes">
                <label>
                    <input type="checkbox" id="uppercase" checked>
                    Великі букви (A-Z)
                </label>
                <label>
                    <input type="checkbox" id="lowercase" checked>
                    Малі букви (a-z)
                </label>
                <label>
                    <input type="checkbox" id="numbers" checked>
                    Цифри (0-9)
                </label>
                <label>
                    <input type="checkbox" id="symbols" checked>
                    Спеціальні символи (!@#$...)
                </label>
            </div>
        </div>

        <button id="generateBtn" class="generate-btn">Генерувати пароль</button>

        <div class="password-strength">
            <h3>Міцність пароля:</h3>
            <div class="strength-bar">
                <div id="strengthIndicator" class="strength-fill"></div>
            </div>
            <p id="strengthText" class="strength-text">-</p>
        </div>

        <div class="history">
            <h3>Історія паролів:</h3>
            <ul id="passwordHistory" class="history-list">
                <!-- Паролі будуть додаватись сюди -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
